<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vesper · Cost Atlas</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }
body {
  background: #0a0a0f;
  color: #d4c8b8;
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  padding: 2rem 1.5rem;
}
.container { max-width: 1440px; margin: 0 auto; }

/* Header */
header { text-align: center; margin-bottom: 2.5rem; }
h1 {
  font-size: 2.2rem; font-weight: 400; letter-spacing: 0.06em;
  color: #d4a574; margin-bottom: 0.2rem;
}
.subtitle {
  font-size: 0.95rem; color: #9b8ec4; letter-spacing: 0.12em;
  font-style: italic; opacity: 0.7;
}
.header-line {
  width: 60px; height: 1px; background: rgba(212,165,116,0.2);
  margin: 0.6rem auto 0;
}

/* Grid */
.grid { display: grid; gap: 1.2rem; }
.cols-4 { grid-template-columns: repeat(4, 1fr); }
.cols-2 { grid-template-columns: 1fr 1fr; }
.cols-3 { grid-template-columns: repeat(3, 1fr); }
.cols-1-2 { grid-template-columns: 1fr 2fr; }

/* Cards */
.card {
  background: rgba(10,10,15,0.8);
  border: 1px solid rgba(212,165,116,0.08);
  border-radius: 8px;
  padding: 1.2rem 1.4rem;
  transition: border-color 0.3s;
}
.card:hover { border-color: rgba(212,165,116,0.18); }
.card-header {
  font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
  color: #9b8ec4; margin-bottom: 0.5rem; font-style: italic;
}
.card-value {
  font-size: 1.8rem; color: #d4a574; font-weight: 400; line-height: 1.1;
}
.card-sub {
  font-size: 0.8rem; color: rgba(212,165,116,0.5); margin-top: 0.15rem;
}
.card-chart { padding: 0.8rem 0.6rem 0.3rem; }

/* Big number card variants */
.card-spend .card-value { color: #d4a574; }
.card-tokens .card-value { color: #9b8ec4; }
.card-sessions .card-value { color: #c48b8b; }

/* Table */
.table-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse; font-size: 0.82rem;
}
thead th {
  text-align: left; padding: 0.5rem 0.6rem;
  color: #9b8ec4; font-weight: 400; font-style: italic;
  border-bottom: 1px solid rgba(212,165,116,0.08);
  cursor: pointer; user-select: none; white-space: nowrap;
}
thead th:hover { color: #d4a574; }
thead th::after { content: ' ▾'; opacity: 0.3; font-size: 0.65rem; }
thead th.asc::after { content: ' ▴'; opacity: 1; color: #d4a574; }
thead th.desc::after { content: ' ▾'; opacity: 1; color: #d4a574; }
tbody td {
  padding: 0.4rem 0.6rem; border-bottom: 1px solid rgba(212,165,116,0.04);
  white-space: nowrap;
}
tbody tr:hover { background: rgba(212,165,116,0.03); }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
td.model-name { color: #d4a574; }
td.source-name { color: #9b8ec4; font-size: 0.75rem; }

/* Heatmap */
.heatmap-wrap { overflow-x: auto; }
.heatmap-table { font-size: 0.7rem; min-width: 600px; }
.heatmap-table td {
  width: 32px; height: 28px; text-align: center; padding: 0;
  border: 1px solid rgba(212,165,116,0.04);
  font-size: 0.6rem; color: rgba(255,255,255,0.3);
}
.heatmap-table th {
  text-align: center; padding: 0.3rem 0.2rem;
  color: #9b8ec4; font-weight: 400; font-style: italic; font-size: 0.65rem;
}
.heatmap-table .day-label {
  text-align: right; padding-right: 0.5rem;
  font-style: normal; color: #9b8ec4; font-size: 0.65rem;
}
.heatmap-cell { border-radius: 2px; transition: opacity 0.2s; }
.heatmap-cell:hover { opacity: 0.85; transform: scale(1.1); }

/* Section title */
.section-title {
  font-size: 0.9rem; color: #d4a574; letter-spacing: 0.08em;
  margin-bottom: 0.8rem; font-style: italic; font-weight: 400;
}
.section-title span { color: #9b8ec4; }

/* Responsive */
@media (max-width: 900px) {
  .cols-4 { grid-template-columns: repeat(2, 1fr); }
  .cols-2 { grid-template-columns: 1fr; }
  .cols-3 { grid-template-columns: 1fr; }
  .cols-1-2 { grid-template-columns: 1fr; }
}
@media (max-width: 500px) {
  .cols-4 { grid-template-columns: 1fr; }
  body { padding: 1rem; }
}
</style>

const MODEL_PALETTE = ['#d4a574','#9b8ec4','#c48b8b','#b8a48a','#a88db0','#c4a07a','#8ea4b8','#c47a7a','#d4b894','#b09ec4'];

// ── Helpers ────────────────────────────────────────────────────────
function fmt(n) { return n.toLocaleString('en-US', {maximumFractionDigits:2}); }
function fmtMoney(n) { return '$' + (n||0).toFixed(4); }
function fmtCompact(n) {
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
}
function safeNum(v) { return (v == null || isNaN(v)) ? 0 : v; }

function aggregateByModel(data) {
  const map = {};
  data.forEach(d => {
    const m = d.model || 'unknown';
    if (!map[m]) map[m] = {model:m, sessions:0, input_tok:0, output_tok:0, cache_read:0, cost:0, tools:0, sources:new Set()};
    map[m].sessions += d.sessions;
    map[m].input_tok += safeNum(d.input_tok);
    map[m].output_tok += safeNum(d.output_tok);
    map[m].cache_read += safeNum(d.cache_read);
    map[m].cost += safeNum(d.cost);
    map[m].tools += safeNum(d.tools);
    map[m].sources.add(d.source);
  });
  return Object.values(map).sort((a,b) => b.cost - a.cost);
}

function aggregateBySource(data) {
  const map = {};
  data.forEach(d => {
    const s = d.source || 'other';
    map[s] = (map[s]||0) + d.sessions;
  });
  return map;
}

function dailyByModel(flat) {
  const days = [...new Set(flat.map(d=>d.day).filter(Boolean))].sort();
  const models = [...new Set(flat.map(d=>d.model).filter(Boolean))].sort();
  // Aggregate per day per model
  const agg = {};
  flat.forEach(d => {
    if (!d.day || !d.model) return;
    const key = d.day+'|'+d.model;
    agg[key] = agg[key] || {day:d.day, model:d.model, cost:0, sessions:0, input_tok:0, output_tok:0};
    agg[key].cost += safeNum(d.cost);
    agg[key].sessions += d.sessions;
    agg[key].input_tok += safeNum(d.input_tok);
    agg[key].output_tok += safeNum(d.output_tok);
  });
  const rows = Object.values(agg);
  const datasets = models.map((model, i) => {
    const color = MODEL_PALETTE[i % MODEL_PALETTE.length];
    return {
      label: model,
      data: days.map(day => {
        const r = rows.find(x => x.day===day && x.model===model);
        return r ? r.cost : 0;
      }),
      backgroundColor: color,
      borderColor: 'transparent',
      borderRadius: 1,
    };
  });
  return { labels: days, datasets };
}

function aggregateTokenByModel(data) {
  const map = {};
  data.forEach(d => {
    const m = d.model || 'unknown';
    if (!map[m]) map[m] = {model:m, input_tok:0, output_tok:0};
    map[m].input_tok += safeNum(d.input_tok);
    map[m].output_tok += safeNum(d.output_tok);
  });
  return Object.values(map).sort((a,b) => (b.input_tok+b.output_tok) - (a.input_tok+a.output_tok));
}

  const totalOutput = SUMMARY_DATA.reduce((s,d) => s + safeNum(d.output_tok), 0);

    </div>
    <div class="card card-tokens">
      <div class="card-header">Total Tokens</div>
      <div class="card-value">${fmt(totalTokens)}</div>
      <div class="card-sub">${fmt(totalInput)} in · ${fmt(totalOutput)} out</div>
    </div>
    <div class="card card-sessions">
      <div class="card-header">Total Sessions</div>
      <div class="card-value">${totalSessions}</div>
      <div class="card-sub">${new Set(SUMMARY_DATA.map(d=>d.model).filter(Boolean)).size} models</div>
    </div>
    <div class="card card-spend">
      <div class="card-header">Avg Cost / Session</div>
      <div class="card-value">$${avgCost.toFixed(4)}</div>
      <div class="card-sub">$${(totalCost / Math.max(totalTokens, 1) * 1e6).toFixed(4)} / 1M tokens</div>
    </div>
  `;
}

          backgroundColor: 'rgba(10,10,15,0.9)',
          borderColor: 'rgba(212,165,116,0.2)',
          borderWidth: 1,

// ── 4. Source Breakdown (Donut) ────────────────────────────────────

// ── 5. Model Comparison Table ─────────────────────────────────────
function buildTable() {
  const data = aggregateByModel(SUMMARY_DATA).filter(d => d.input_tok + d.output_tok > 0);

  let sortKey = 'cost';
  let sortDir = -1;

  function render() {
    const sorted = [...data].sort((a,b) => {
      const va = safeNum(a[sortKey]);
      const vb = safeNum(b[sortKey]);
      return (va - vb) * sortDir;
    });

    const thead = document.querySelector('#modelTable thead');
    const tbody = document.querySelector('#modelTable tbody');

    const cols = [
      { key: 'model', label: 'Model' },
      { key: 'sessions', label: 'Sessions' },
      { key: 'input_tok', label: 'Input Tokens' },
      { key: 'output_tok', label: 'Output Tokens' },
      { key: 'cache_read', label: 'Cache Read' },
      { key: 'cost', label: 'Cost (USD)' },
      { key: 'cost_per_m', label: 'Cost/1M Tok' },
      { key: 'avg_tok', label: 'Avg Tok/Session' },
    ];

    thead.innerHTML = '<tr>' + cols.map(c =>
      `<th data-key="${c.key}" class="${sortKey===c.key?(sortDir<0?'desc':'asc'):''}">${c.label}</th>`
    ).join('') + '</tr>';

    tbody.innerHTML = sorted.map(d => {
      const totalTok = safeNum(d.input_tok) + safeNum(d.output_tok);
      const costPerM = totalTok > 0 ? safeNum(d.cost) / totalTok * 1e6 : 0;
      const avgTok = d.sessions > 0 ? Math.round(totalTok / d.sessions) : 0;
      return `<tr>
        <td class="model-name">${d.model}</td>
        <td class="num">${d.sessions}</td>
        <td class="num">${fmt(d.input_tok)}</td>
        <td class="num">${fmt(d.output_tok)}</td>
        <td class="num">${fmt(d.cache_read)}</td>
        <td class="num">${fmtMoney(safeNum(d.cost))}</td>
        <td class="num">${costPerM > 0 ? '$' + costPerM.toFixed(4) : '—'}</td>
        <td class="num">${fmt(avgTok)}</td>
      </tr>`;
    }).join('');

    thead.querySelectorAll('th').forEach(th => {
      th.addEventListener('click', () => {
        const key = th.dataset.key;
        if (key === sortKey) sortDir *= -1;
        else { sortKey = key; sortDir = -1; }
        render();
      });
    });
  }
  render();
}

// ── 6. Activity Heatmap ────────────────────────────────────────────
function buildHeatmap() {
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const HOURS = Array.from({length:24}, (_,i) => String(i).padStart(2,'0'));

  const map = {};
  HEATMAP_DATA.forEach(d => {
    const key = d.day_of_week + '|' + d.hour;
    map[key] = d;
  });

  // Find max sessions for color scaling
  const maxSessions = Math.max(...HEATMAP_DATA.map(d => d.sessions), 1);

  let html = '<table class="heatmap-table"><thead><tr><th></th>';
  HOURS.forEach(h => {
    html += `<th>${h}</th>`;
  });
  html += '</tr></thead><tbody>';

  DAYS.forEach((day, dow) => {
    html += `<tr><td class="day-label">${day}</td>`;
    HOURS.forEach(hour => {
      const key = dow + '|' + hour;
      const d = map[key];
      const sessions = d ? d.sessions : 0;
      const intensity = sessions / maxSessions;
      const r = Math.round(10 + 120 * intensity);
      const g = Math.round(10 + 80 * intensity);
      const b = Math.round(15 + 70 * intensity);
      const bg = d ? `rgb(${r},${g},${b})` : 'rgba(255,255,255,0.02)';
      const tooltip = d ? `${sessions} session(s), ${fmtCompact(d.tokens)} tokens` : '';
      html += `<td style="background:${bg}" title="${tooltip}" class="heatmap-cell">${sessions > 0 ? sessions : ''}</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('heatmapContainer').innerHTML = html;
}
